<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appwrite Contribution Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111111;
            --text: #e0e0e0;
            --primary: #fd366e;
            --code-bg: #1a1a1a;
            --border: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 800px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #fd366e, #fe95ba);
        }
        h1, h2, h3 { color: var(--primary); }
        pre {
            background: var(--code-bg);
            padding: 20px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        code { font-family: 'Fira Code', monospace; background: #222; padding: 2px 4px; border-radius: 4px; }
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
            text-align: right;
            border-top: 1px solid #222;
            padding-top: 10px;
        }
        .tag {
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tag">APPWRITE OPEN SOURCE CONTRIBUTION</div>
        <div id="content"></div>
        <div class="footer">
            Contributor: @urjit upadhyay | Day 8: Appwrite | API Documentation Hack
        </div>
    </div>
    <script>
        const markdown = `# Create User

Add a new user to your project. This endpoint creates a new user account with the provided details.

### API Information
- **Endpoint**: \`/v1/users\`
- **Method**: \`POST\`
- **Permissions**: \`users.write\`

### Parameters
- **userId**: (Required) A unique ID for the user. Use \`ID.unique()\` to generate a random ID.
- **email**: User email address. Must be unique across the project.
- **phone**: Phone number in E.164 format (e.g., +12065550100).
- **password**: User password. Must be at least 8 characters long.
- **name**: User name (max 128 chars).

### Example
\`\`\`json
{
  "name": "Create User",
  "endpoint": "/v1/users",
  "method": "POST"
}
\`\`\``;
        document.getElementById('content').innerHTML = marked.parse(markdown);
    </script>
</body>
</html>
