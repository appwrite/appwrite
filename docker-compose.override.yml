services:
  appwrite:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/usr/src/code/docker-compose.yml
      - ./.env:/usr/src/code/.env
      - ./phpunit.xml:/usr/src/code/phpunit.xml
      - ./tests:/usr/src/code/tests
      - ./app:/usr/src/code/app
      - ./docs:/usr/src/code/docs
      - ./public:/usr/src/code/public
      - ./src:/usr/src/code/src
      - ./dev:/usr/src/code/dev
    depends_on:
      - coredns
    ports:
      - 9501:80
    dns:
      - 127.0.0.11
      - 172.16.238.100
    entrypoint:
      - php
      - -e
      - app/http.php
    environment:
      - _APP_MESSAGE_SMS_TEST_DSN
      - _APP_MESSAGE_EMAIL_TEST_DSN
      - _APP_MESSAGE_PUSH_TEST_DSN
      - _TESTS_OAUTH2_GITHUB_CLIENT_ID
      - _TESTS_OAUTH2_GITHUB_CLIENT_SECRET
  appwrite-realtime:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
    ports:
      - 9502:80
  appwrite-worker-audits:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-webhooks:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
    depends_on:
      - request-catcher-sms
      - request-catcher-webhook
  appwrite-worker-deletes:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-databases:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-builds:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-jobs:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-screenshots:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-certificates:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-executions:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-functions:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-mails:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
    depends_on:
      - maildev
  appwrite-worker-notifications:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
    depends_on:
      - maildev
  appwrite-worker-messaging:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-migrations:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
      - ./tests:/usr/src/code/tests
  appwrite-task-maintenance:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-task-interval:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-task-stats-resources:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-stats-resources:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-worker-stats-usage:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  gitea:
    image: gitea/gitea:1.22.6
    container_name: appwrite-gitea
    profiles:
      - vcs
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://gitea:3000/
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__repository__DEFAULT_BRANCH=main
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__webhook__SKIP_TLS_VERIFY=true
    volumes:
      - appwrite-gitea:/data
    ports:
      - "9515:3000"
    networks:
      - appwrite
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
  gitea-setup:
    image: gitea/gitea:1.22.6
    container_name: appwrite-gitea-setup
    profiles:
      - vcs
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      - GITEA_URL=http://gitea:3000
      - GITEA_ADMIN_USER=appwrite
      - GITEA_ADMIN_PASSWORD=password
      - GITEA_ADMIN_EMAIL=appwrite@localhost.test
    volumes:
      - appwrite-gitea:/data
      - ./dev/gitea/setup.sh:/setup.sh:ro
    networks:
      - appwrite
    command:
      ["/bin/sh", "-c", "/setup.sh && touch /tmp/ready && tail -f /dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 2s
      timeout: 2s
      retries: 30
  appwrite-task-scheduler-functions:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-task-scheduler-executions:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  appwrite-task-scheduler-messages:
    build:
      context: .
      target: development
      args:
        DEBUG: false
        TESTING: true
        VERSION: dev
    image: appwrite-dev
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
  coredns:
    image: coredns/coredns:1.12.4
    container_name: appwrite-coredns
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m
    command:
      - -conf
      - /mnt/resources/Corefile
    networks:
      appwrite:
        ipv4_address: 172.16.238.100
    volumes:
      - ./tests/resources/coredns:/mnt/resources:ro
  maildev:
    image: appwrite/mailcatcher:1.1.1
    container_name: appwrite-mailcatcher
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m
    ports:
      - 9503:1080
    networks:
      - appwrite
      - gateway
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.docker.network=gateway
      - traefik.http.services.appwrite_maildev.loadbalancer.server.port=1080
      - traefik.http.routers.appwrite_maildev_http.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_maildev_http.rule=Host(`mail.localhost`)
      - traefik.http.routers.appwrite_maildev_http.service=appwrite_maildev
      - traefik.http.routers.appwrite_maildev_https.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_maildev_https.rule=Host(`mail.localhost`)
      - traefik.http.routers.appwrite_maildev_https.service=appwrite_maildev
      - traefik.http.routers.appwrite_maildev_https.tls=true
    environment:
      - MAILDEV_INCOMING_USER=${_APP_SMTP_USERNAME}
      - MAILDEV_INCOMING_PASS=${_APP_SMTP_PASSWORD}
  request-catcher-webhook:
    image: appwrite/requestcatcher:1.1.0
    container_name: appwrite-requestcatcher-webhook
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m
    ports:
      - 9504:5000
    networks:
      - appwrite
  request-catcher-sms:
    image: appwrite/requestcatcher:1.1.0
    container_name: appwrite-requestcatcher-sms
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: 10m
    ports:
      - 9507:5000
    networks:
      - appwrite
  appwrite-mongo-express:
    profiles:
      - mongodb
    image: mongo-express
    container_name: appwrite-mongo-express
    networks:
      - appwrite
    ports:
      - "9508:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:${_APP_DB_ROOT_PASS}@appwrite-mongodb:27017/?replicaSet=rs0&directConnection=true
      ME_CONFIG_BASICAUTH_USERNAME: ${_APP_DB_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${_APP_DB_PASS}
    depends_on:
      mongodb:
        condition: service_healthy
  adminer:
    image: adminer
    container_name: appwrite-adminer
    restart: always
    ports:
      - 9506:8080
    networks:
      - appwrite
      - gateway
    environment:
      - ADMINER_DESIGN=pepa-linha
      - ADMINER_DEFAULT_SERVER=mariadb
      - ADMINER_DEFAULT_USERNAME=root
      - ADMINER_DEFAULT_PASSWORD=rootsecretpassword
      - ADMINER_DEFAULT_DB=appwrite
    configs:
      - source: adminer-index.php
        target: /var/www/html/index.php
        mode: 493
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.docker.network=gateway
      - traefik.http.services.appwrite_adminer.loadbalancer.server.port=8080
      - traefik.http.routers.appwrite_adminer_http.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_adminer_http.rule=Host(`mysql.localhost`)
      - traefik.http.routers.appwrite_adminer_http.service=appwrite_adminer
      - traefik.http.routers.appwrite_adminer_https.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_adminer_https.rule=Host(`mysql.localhost`)
      - traefik.http.routers.appwrite_adminer_https.service=appwrite_adminer
      - traefik.http.routers.appwrite_adminer_https.tls=true
  redis-insight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    networks:
      - appwrite
      - gateway
    environment:
      - RI_PRE_SETUP_DATABASES_PATH=/mnt/connections.json
    configs:
      - source: redisinsight-connections.json
        target: /mnt/connections.json
        mode: 493
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.docker.network=gateway
      - traefik.http.services.appwrite_redisinsight.loadbalancer.server.port=5540
      - traefik.http.routers.appwrite_redisinsight_http.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_redisinsight_http.rule=Host(`redis.localhost`)
      - traefik.http.routers.appwrite_redisinsight_http.service=appwrite_redisinsight
      - traefik.http.routers.appwrite_redisinsight_https.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_redisinsight_https.rule=Host(`redis.localhost`)
      - traefik.http.routers.appwrite_redisinsight_https.service=appwrite_redisinsight
      - traefik.http.routers.appwrite_redisinsight_https.tls=true
    ports:
      - "9514:5540"
  graphql-explorer:
    container_name: appwrite-graphql-explorer
    image: appwrite/altair:0.3.0
    restart: unless-stopped
    networks:
      - appwrite
    ports:
      - 9509:3000
    environment:
      - SERVER_URL=http://localhost:9520/v1/graphql
  traefik:
    command:
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`,`appwrite`)
      - --entrypoints.appwrite_web.address=:80
      - --entrypoints.appwrite_websecure.address=:443
      - --log.level=DEBUG
      - --api.insecure=true
      - --accesslog=true
    ports:
      - 9520:80
      - 9522:80
      - 9521:443
      - 9500:8080
    networks:
      appwrite:
        aliases:
          - appwrite.test
      gateway:
        aliases:
          - appwrite.test
      runtimes:
        aliases:
          - appwrite.test
  mariadb:
    ports:
      - "9510:3306"
  mongodb:
    ports:
      - "9511:27017"
  postgresql:
    ports:
      - "9512:5432"
  redis:
    ports:
      - "9513:6379"
  appwrite-embedding:
    ports:
      - "9505:3000"
configs:
  redisinsight-connections.json:
    content: |
      [
        {
          "compressor": "NONE",
          "id": "104dc90a-21ef-4d5e-8912-b30baabb152f",
          "host": "redis",
          "port": 6379,
          "name": "redis:6379",
          "db": 0,
          "username": "default",
          "password": null,
          "connectionType": "STANDALONE",
          "nameFromProvider": null,
          "provider": "REDIS",
          "lastConnection": "2025-10-16T09:22:02.591Z",
          "modules": [
            {
              "name": "ReJSON",
              "version": 20808,
              "semanticVersion": "2.8.8"
            },
            {
              "name": "search",
              "version": 21015,
              "semanticVersion": "2.10.15"
            }
          ],
          "tls": false,
          "tlsServername": null,
          "verifyServerCert": null,
          "caCert": null,
          "clientCert": null,
          "ssh": false,
          "sshOptions": null,
          "forceStandalone": false,
          "tags": []
        }
      ]
  adminer-index.php:
    content: |
      <?php
        if(!count($$_GET)) {
          $$_POST['auth'] = [
            'server' => $$_ENV['ADMINER_DEFAULT_SERVER'],
            'driver' => 'server', /* seems to autodetect the driver from server settings */
            'username' => $$_ENV['ADMINER_DEFAULT_USERNAME'],
            'password' => $$_ENV['ADMINER_DEFAULT_PASSWORD'],
            'db' => $$_ENV['ADMINER_DEFAULT_DB'],
          ];
        }
        include './adminer.php';
networks:
  appwrite:
    ipam:
      config:
        - subnet: 172.16.238.0/24
volumes:
  appwrite-gitea: null
